<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1e293b">
    <title>Admin Panel - Tienda La Reina</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-sidebar: #1e293b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-sidebar: #94a3b8;
            --border: #e2e8f0;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.6;
        }
        
        .sidebar {
            width: 280px; background: var(--bg-sidebar);
            height: 100vh; position: fixed; left: 0; top: 0;
            padding: 24px 16px; transition: transform 0.3s ease;
            z-index: 1000; display: flex; flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar-brand {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 12px; margin-bottom: 28px; color: white;
            text-decoration: none;
        }
        .sidebar-brand i { font-size: 28px; color: var(--primary); }
        .sidebar-brand span { font-size: 1.2rem; font-weight: 700; }
        
        .nav-section { margin-bottom: 20px; }
        .nav-section-title {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            color: var(--text-sidebar); letter-spacing: 1.5px;
            padding: 8px 16px; margin-bottom: 4px;
        }
        
        .nav-item {
            padding: 11px 16px; border-radius: var(--radius-sm);
            color: var(--text-sidebar); cursor: pointer;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 3px; transition: var(--transition);
            font-weight: 500; position: relative; border: none;
            background: transparent; width: 100%; text-align: left;
            font-size: 0.9rem;
        }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        
        .main-content {
            margin-left: 280px; padding: 28px 32px;
            min-height: 100vh; transition: margin 0.3s ease;
        }
        
        .mobile-toggle {
            display: none; position: fixed; top: 16px; left: 16px; z-index: 1100;
            background: var(--primary); color: white; border: none;
            padding: 12px 16px; border-radius: var(--radius-sm);
            cursor: pointer; font-weight: 600;
            align-items: center; gap: 8px;
        }
        
        .card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border); box-shadow: var(--shadow-sm);
        }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; }
        .card-body { padding: 20px; }
        
        .btn {
            font-weight: 600; border-radius: var(--radius-sm); padding: 10px 18px;
            transition: var(--transition); font-size: 0.85rem; border: none;
            display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline-primary { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline-primary:hover { background: var(--primary); color: white; }
        .btn-outline-danger { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-outline-danger:hover { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #1ebc57; }
        
        .table-responsive { border-radius: var(--radius); overflow: hidden; }
        .table { font-size: 0.85rem; margin-bottom: 0; }
        .table th {
            font-weight: 700; color: var(--text-muted); text-transform: uppercase;
            font-size: 0.7rem; padding: 14px 12px;
            background: #f8fafc; border-bottom: 2px solid var(--border);
        }
        .table td { padding: 12px; vertical-align: middle; }
        .table tbody tr:hover { background: #f8fafc; }
        
        .badge {
            padding: 5px 12px; border-radius: 50px; font-weight: 600;
            font-size: 0.7rem;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fffbeb; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-primary { background: #ede9fe; color: #4f46e5; }
        
        .login-overlay {
            position: fixed; inset: 0; z-index: 2000;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white; padding: 40px 36px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .login-card i { font-size: 48px; color: var(--primary); margin-bottom: 16px; }
        .login-card h2 { margin-bottom: 6px; font-weight: 700; }
        
        .empty-state {
            text-align: center; padding: 40px 20px; color: var(--text-muted);
        }
        .empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 12px; display: block; }
        
        .admin-toast {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            background: white; padding: 14px 20px; border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 4px solid var(--success);
            display: flex; align-items: center; gap: 12px;
            transform: translateX(120%); transition: transform 0.3s ease;
            font-weight: 500;
        }
        .admin-toast.show { transform: translateX(0); }
        .admin-toast.error { border-left-color: var(--danger); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 80px 16px 24px; }
            .mobile-toggle { display: flex; }
        }
        
        .form-label { font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; }
        .form-control, .form-select {
            border: 2px solid var(--border); border-radius: var(--radius-sm);
            padding: 10px 14px; font-size: 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary); outline: none;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        
        .codigo-badge {
            background: #f0f9ff; border: 2px dashed var(--primary);
            padding: 6px 14px; border-radius: var(--radius-sm);
            font-family: monospace; font-weight: 700;
            font-size: 0.85rem; color: var(--primary-dark);
        }
        
        .order-card { border-left: 4px solid var(--primary); margin-bottom: 16px; }
        .store-form-card {
            background: linear-gradient(135deg, #ede9fe50, #e0e7ff50);
            border-radius: var(--radius-lg); padding: 24px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-overlay" id="loginScreen">
    <div class="login-card">
        <i class="fas fa-crown"></i>
        <h2>Tienda La Reina</h2>
        <p class="text-muted mb-3">Panel Administrativo</p>
        <div class="mb-3">
            <input type="password" id="passInput" class="form-control" 
                   placeholder="Contraseña" autocomplete="current-password">
        </div>
        <button type="button" id="loginBtn" class="btn btn-primary w-100 py-2">
            <i class="fas fa-lock-open"></i> Ingresar
        </button>
        <div id="loginError" style="color:var(--danger);margin-top:12px;display:none;"></div>
    </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-store"></i><span>Tienda La Reina</span>
    </div>
    
    <div class="store-selector" style="padding: 0 12px 20px 12px;">
        <label style="color: var(--text-sidebar); font-size: 0.7rem; display: block; margin-bottom: 8px;">Tienda Activa</label>
        <select id="storeSelect" class="form-select" style="background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.2);"></select>
    </div>
    
    <div class="nav-section">
        <div class="nav-section-title">Gestión</div>
        <button class="nav-item active" data-section="products" onclick="switchSection('products')">
            <i class="fas fa-box"></i> Productos
        </button>
        <button class="nav-item" data-section="orders" onclick="switchSection('orders')">
            <i class="fas fa-shopping-cart"></i> Pedidos
            <span class="new-dot" id="newOrderDot"></span>
        </button>
        <button class="nav-item" data-section="stores" onclick="switchSection('stores')">
            <i class="fas fa-store-alt"></i> Tiendas
        </button>
        <button class="nav-item" data-section="settings" onclick="switchSection('settings')">
            <i class="fas fa-cog"></i> Ajustes
        </button>
    </div>
    
    <div class="sidebar-footer" style="margin-top: auto; padding-top: 20px;">
        <button class="btn btn-danger w-100" onclick="handleLogout()" style="background: rgba(239,68,68,0.2); color: #ef4444;">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>
</aside>

<button class="mobile-toggle" id="mobileToggle" onclick="document.getElementById('sidebar').classList.toggle('active')">
    <i class="fas fa-bars"></i> Menú
</button>

<!-- MAIN CONTENT -->
<main class="main-content" id="main-content" style="display:none;">
    
    <!-- PRODUCTS VIEW -->
    <div id="view-products">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3><i class="fas fa-box me-2" style="color:var(--primary);"></i>Productos - <span id="currentStoreName">---</span></h3>
            <button class="btn btn-primary" onclick="openProductModal()">
                <i class="fas fa-plus"></i> Nuevo Producto
            </button>
        </div>
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr><th>Img</th><th>Nombre</th><th>Precio</th><th>Desc%</th><th>Categoría</th><th>Tamaño</th><th>Estado</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="productsList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ORDERS VIEW -->
    <div id="view-orders" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3><i class="fas fa-shopping-cart me-2" style="color:var(--primary);"></i>Pedidos - <span id="currentStoreNameOrders">---</span></h3>
            <button class="btn btn-outline-danger btn-sm" onclick="deleteAllOrders()">
                <i class="fas fa-trash"></i> Limpiar todos
            </button>
        </div>
        <div id="ordersList"></div>
    </div>
    
    <!-- STORES VIEW -->
    <div id="view-stores" style="display:none;">
        <h3 class="mb-3"><i class="fas fa-store-alt me-2" style="color:var(--primary);"></i>Gestión de Tiendas</h3>
        
        <div class="store-form-card">
            <h5 class="mb-3"><span id="formTitle">➕ Agregar Nueva Tienda</span></h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">ID (slug)</label>
                    <input type="text" id="storeSlug" class="form-control" placeholder="ej. electro">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nombre Comercial</label>
                    <input type="text" id="storeDisplayName" class="form-control" placeholder="Electrodomésticos">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Icono</label>
                    <input type="text" id="storeIcon" class="form-control" value="⚡">
                </div>
                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    <textarea id="storeDescription" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-12">
                    <label class="form-label">Categorías</label>
                    <input type="text" id="storeCategories" class="form-control" placeholder="refrigeradores, lavadoras">
                </div>
                <div class="col-12">
                    <input type="hidden" id="storeId">
                    <button class="btn btn-primary" onclick="saveStore()"><i class="fas fa-save"></i> <span id="submitBtnText">Crear Tienda</span></button>
                    <button class="btn btn-secondary" onclick="resetStoreForm()">Cancelar</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">📋 Tiendas Registradas</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>ID</th><th>Icono</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
                        <tbody id="storesList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- SETTINGS VIEW -->
    <div id="view-settings" style="display:none;">
        <h3 class="mb-3"><i class="fas fa-cog me-2" style="color:var(--primary);"></i>Configuración</h3>
        <div class="card" style="max-width: 500px;">
            <div class="card-header">💰 Tasas de Cambio</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">1 USD a CUP</label>
                    <input type="number" id="rateUSD" class="form-control" step="0.01">
                </div>
                <div class="mb-3">
                    <label class="form-label">1 EUR a CUP</label>
                    <input type="number" id="rateEUR" class="form-control" step="0.01">
                </div>
                <button class="btn btn-primary w-100" onclick="saveCurrencyConfig()">Guardar</button>
            </div>
        </div>
    </div>
</main>

<!-- PRODUCT MODAL -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="productId">
                <div class="mb-3">
                    <label class="form-label">Nombre *</label>
                    <input type="text" id="prodName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea id="prodDescription" class="form-control" rows="2"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Precio (CUP)</label>
                        <input type="number" id="prodPrice" class="form-control" step="0.01">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Descuento %</label>
                        <input type="number" id="prodDiscount" class="form-control" value="0">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Categoría</label>
                        <select id="prodCategory" class="form-select"></select>
                        <button class="btn btn-sm btn-outline-primary mt-2" onclick="quickAddCategory()">+ Nueva</button>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tamaño</label>
                        <select id="prodSize" class="form-select">
                            <option value="pequeno">Pequeño</option>
                            <option value="grande">Grande</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select id="prodStock" class="form-select">
                        <option value="true">Disponible</option>
                        <option value="false">Agotado</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">URL Imagen</label>
                    <input type="text" id="prodImage" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Subir imagen</label>
                    <input type="file" id="prodFile" class="form-control" accept="image/*">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="saveProduct()">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="admin-toast" id="adminToast">
    <i class="fas fa-check-circle"></i>
    <span id="adminToastMsg"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ==================== VARIABLES GLOBALES ====================
let adminPassword = '';
let stores = [];
let categories = [];
let currentModal = null;
let pollingInterval = null;

// ==================== UTILIDADES ====================
function $(id) { return document.getElementById(id); }

function showToast(msg, isError = false) {
    const toast = $('adminToast');
    const icon = toast.querySelector('i');
    const span = $('adminToastMsg');
    
    icon.className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
    toast.style.borderLeftColor = isError ? '#ef4444' : '#10b981';
    span.textContent = msg;
    toast.classList.add('show');
    
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// ==================== API CON AUTH ====================
async function apiFetch(url, options = {}) {
    if (!adminPassword) throw new Error('No autenticado');
    
    const separator = url.includes('?') ? '&' : '?';
    const authUrl = url + separator + 'password=' + encodeURIComponent(adminPassword);
    
    const response = await fetch(authUrl, {
        ...options,
        headers: {
            'Content-Type': 'application/json',
            ...options.headers
        }
    });
    
    if (response.status === 401) {
        handleLogout();
        throw new Error('Sesión expirada');
    }
    
    if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || 'Error en la petición');
    }
    
    return response.json();
}

// ==================== LOGIN ====================
async function doLogin() {
    const pass = $('passInput').value;
    const btn = $('loginBtn');
    const errorDiv = $('loginError');
    
    if (!pass) {
        errorDiv.textContent = 'Ingrese la contraseña';
        errorDiv.style.display = 'block';
        return;
    }
    
    errorDiv.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
    
    try {
        const response = await fetch('/api/admin/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pass })
        });
        
        const data = await response.json();
        
        if (data.success === true) {
            adminPassword = pass;
            localStorage.setItem('admin_pass', pass);
            
            // Mostrar panel principal
            $('loginScreen').style.display = 'none';
            $('main-content').style.display = 'block';
            
            // Inicializar todo
            await initApp();
            showToast('✅ Bienvenido al Panel Administrativo');
        } else {
            errorDiv.textContent = '❌ Contraseña incorrecta';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock-open"></i> Ingresar';
            $('passInput').value = '';
            $('passInput').focus();
        }
    } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = '❌ Error de conexión: ' + error.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-lock-open"></i> Ingresar';
    }
}

async function checkSavedAuth() {
    const savedPass = localStorage.getItem('admin_pass');
    if (!savedPass) return false;
    
    try {
        const response = await fetch('/api/admin/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: savedPass })
        });
        
        const data = await response.json();
        
        if (data.success === true) {
            adminPassword = savedPass;
            $('loginScreen').style.display = 'none';
            $('main-content').style.display = 'block';
            await initApp();
            return true;
        }
    } catch (error) {
        console.log('Error checking auth:', error);
    }
    
    return false;
}

window.handleLogout = function() {
    localStorage.removeItem('admin_pass');
    adminPassword = '';
    if (pollingInterval) clearInterval(pollingInterval);
    location.reload();
};

// ==================== INICIALIZACIÓN ====================
async function initApp() {
    await loadStoresList();
    await loadCategories();
    await loadProducts();
    await loadOrders();
    startPolling();
}

// ==================== TIENDAS ====================
async function loadStoresList() {
    try {
        const data = await apiFetch('/api/admin/tiendas');
        stores = data || [];
        
        const select = $('storeSelect');
        if (!stores.length) {
            select.innerHTML = '<option>⚠️ No hay tiendas - Crea una</option>';
            return;
        }
        
        select.innerHTML = stores.map(s => 
            `<option value="${s.id}">${s.icono || '🛒'} ${s.nombre}</option>`
        ).join('');
        
        updateStoreLabels();
        await loadStoresTable();
    } catch (error) {
        console.error('Error loading stores:', error);
        showToast('Error al cargar tiendas', true);
    }
}

function updateStoreLabels() {
    const select = $('storeSelect');
    const selectedText = select.options[select.selectedIndex]?.text || '---';
    $('currentStoreName').textContent = selectedText;
    $('currentStoreNameOrders').textContent = selectedText;
}

function getCurrentStore() {
    return $('storeSelect').value;
}

$('storeSelect').addEventListener('change', async () => {
    updateStoreLabels();
    await loadCategories();
    await loadProducts();
    await loadOrders();
});

async function loadStoresTable() {
    try {
        const data = await apiFetch('/api/admin/tiendas');
        const tbody = $('storesList');
        
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No hay tiendas</td></tr>';
            return;
        }
        
        tbody.innerHTML = data.map(s => `
            <tr>
                <td><code>${escapeHtml(s.id)}</code></td>
                <td style="font-size:1.5rem">${escapeHtml(s.icono || '🛒')}</td>
                <td><strong>${escapeHtml(s.nombre)}</strong></td>
                <td>${escapeHtml((s.descripcion || '').substring(0, 50))}</td>
                <td>
                    <button class="btn btn-outline-primary btn-sm" onclick="editStore('${s.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteStore('${s.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error('Error:', error);
    }
}

window.editStore = async function(slug) {
    try {
        const store = await apiFetch(`/api/admin/tiendas/${slug}`);
        $('storeId').value = store.id;
        $('storeSlug').value = store.id;
        $('storeSlug').readOnly = true;
        $('storeDisplayName').value = store.nombre;
        $('storeIcon').value = store.icono || '🛒';
        $('storeDescription').value = store.descripcion || '';
        $('storeCategories').value = (store.categorias || []).join(', ');
        $('formTitle').innerHTML = '✏️ Editar Tienda';
        $('submitBtnText').textContent = 'Actualizar Tienda';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (error) {
        showToast('Error cargando tienda', true);
    }
};

window.resetStoreForm = function() {
    $('storeId').value = '';
    $('storeSlug').value = '';
    $('storeSlug').readOnly = false;
    $('storeDisplayName').value = '';
    $('storeIcon').value = '⚡';
    $('storeDescription').value = '';
    $('storeCategories').value = '';
    $('formTitle').innerHTML = '➕ Agregar Nueva Tienda';
    $('submitBtnText').textContent = 'Crear Tienda';
};

window.saveStore = async function() {
    const id = $('storeId').value;
    const slug = $('storeSlug').value.trim().toLowerCase();
    const name = $('storeDisplayName').value.trim();
    
    if (!slug || !name) {
        showToast('Completa ID y Nombre', true);
        return;
    }
    
    try {
        const body = {
            id: slug,
            nombre: name,
            icono: $('storeIcon').value.trim() || '🛒',
            descripcion: $('storeDescription').value.trim(),
            categorias: $('storeCategories').value.split(',').map(c => c.trim()).filter(Boolean),
            configuracion: {}
        };
        
        if (id) {
            await apiFetch(`/api/admin/tiendas/${id}`, {
                method: 'PUT',
                body: JSON.stringify(body)
            });
            showToast('✅ Tienda actualizada');
        } else {
            await apiFetch('/api/admin/tiendas', {
                method: 'POST',
                body: JSON.stringify(body)
            });
            showToast('✅ Tienda creada');
        }
        
        resetStoreForm();
        await loadStoresList();
    } catch (error) {
        showToast('Error al guardar: ' + error.message, true);
    }
};

window.deleteStore = async function(slug) {
    if (!confirm(`¿Eliminar tienda "${slug}"? Se borrarán todos sus productos y pedidos.`)) return;
    
    try {
        await apiFetch(`/api/admin/tiendas/${slug}`, { method: 'DELETE' });
        await loadStoresList();
        showToast('🗑️ Tienda eliminada');
    } catch (error) {
        showToast('Error al eliminar', true);
    }
};

// ==================== CATEGORÍAS ====================
async function loadCategories() {
    const store = getCurrentStore();
    if (!store) return;
    
    try {
        const data = await apiFetch(`/api/admin/categorias?tienda=${store}`);
        categories = data || ['otros'];
        updateCategorySelect();
    } catch (error) {
        categories = ['otros'];
    }
}

function updateCategorySelect() {
    const sel = $('prodCategory');
    sel.innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
}

window.quickAddCategory = async function() {
    const name = prompt('Nombre de la categoría:');
    if (!name) return;
    
    try {
        await apiFetch('/api/admin/categorias', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tienda: getCurrentStore(), categoria: name.toLowerCase().trim() })
        });
        await loadCategories();
        showToast(`✅ Categoría "${name}" agregada`);
    } catch (error) {
        showToast('Error al agregar categoría', true);
    }
};

// ==================== PRODUCTOS ====================
async function loadProducts() {
    const store = getCurrentStore();
    if (!store) return;
    
    try {
        const products = await apiFetch(`/api/admin/productos?tienda=${store}`);
        const tbody = $('productsList');
        
        if (!products.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No hay productos</td></tr>';
            return;
        }
        
        tbody.innerHTML = products.map(p => {
            const img = Array.isArray(p.imagen) ? p.imagen[0] : p.imagen;
            return `
                <tr>
                    <td><img src="${escapeHtml(img)}" style="width:42px;height:42px;border-radius:8px;object-fit:cover;" onerror="this.src='https://via.placeholder.com/42'"></td>
                    <td class="fw-semibold">${escapeHtml(p.nombre)}</td>
                    <td>$${Number(p.precio).toFixed(2)}</td>
                    <td>${p.descuento || 0}%</td>
                    <td><span class="badge bg-primary">${escapeHtml(p.categoria)}</span></td>
                    <td>${p.tamanio === 'grande' ? '📏 Grande' : '📐 Pequeño'}</td>
                    <td>${p.disponible ? '<span class="badge bg-success">Disponible</span>' : '<span class="badge bg-danger">Agotado</span>'}</td>
                    <td>
                        <button class="btn btn-outline-primary btn-sm" onclick="editProduct(${p.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteProduct(${p.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    } catch (error) {
        console.error('Error loading products:', error);
    }
}

window.openProductModal = function() {
    $('productId').value = '';
    $('prodName').value = '';
    $('prodDescription').value = '';
    $('prodPrice').value = '';
    $('prodDiscount').value = '0';
    $('prodSize').value = 'pequeno';
    $('prodStock').value = 'true';
    $('prodImage').value = '';
    $('prodFile').value = '';
    updateCategorySelect();
    currentModal = new bootstrap.Modal($('productModal'));
    currentModal.show();
};

window.editProduct = async function(id) {
    const store = getCurrentStore();
    try {
        const products = await apiFetch(`/api/admin/productos?tienda=${store}`);
        const product = products.find(p => p.id === id);
        if (!product) return;
        
        $('productId').value = product.id;
        $('prodName').value = product.nombre;
        $('prodDescription').value = product.descripcion || '';
        $('prodPrice').value = product.precio;
        $('prodDiscount').value = product.descuento || 0;
        $('prodSize').value = product.tamanio || 'pequeno';
        $('prodStock').value = product.disponible ? 'true' : 'false';
        $('prodImage').value = Array.isArray(product.imagen) ? product.imagen[0] : (product.imagen || '');
        updateCategorySelect();
        $('prodCategory').value = product.categoria;
        currentModal = new bootstrap.Modal($('productModal'));
        currentModal.show();
    } catch (error) {
        showToast('Error cargando producto', true);
    }
};

window.saveProduct = async function() {
    const id = $('productId').value;
    const store = getCurrentStore();
    const name = $('prodName').value.trim();
    const price = $('prodPrice').value;
    
    if (!store || !name || !price) {
        showToast('Completa Nombre y Precio', true);
        return;
    }
    
    const formData = new FormData();
    formData.append('tienda', store);
    formData.append('nombre', name);
    formData.append('descripcion', $('prodDescription').value.trim());
    formData.append('precio', price);
    formData.append('descuento', $('prodDiscount').value || 0);
    formData.append('tamanio', $('prodSize').value);
    formData.append('categoria', $('prodCategory').value);
    formData.append('disponible', $('prodStock').value);
    formData.append('imagen_url', $('prodImage').value.trim());
    
    const file = $('prodFile').files[0];
    if (file) formData.append('imagen', file);
    
    try {
        const url = id ? `/api/admin/productos/${id}` : '/api/admin/productos';
        const response = await fetch(`${url}?password=${encodeURIComponent(adminPassword)}`, {
            method: id ? 'PUT' : 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            if (currentModal) currentModal.hide();
            await loadProducts();
            showToast(id ? '✅ Producto actualizado' : '✅ Producto creado');
            $('prodFile').value = '';
        } else {
            showToast(data.error || 'Error al guardar', true);
        }
    } catch (error) {
        showToast('Error: ' + error.message, true);
    }
};

window.deleteProduct = async function(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    
    try {
        await apiFetch(`/api/admin/productos/${id}?tienda=${getCurrentStore()}`, { method: 'DELETE' });
        await loadProducts();
        showToast('🗑️ Producto eliminado');
    } catch (error) {
        showToast('Error al eliminar', true);
    }
};

// ==================== PEDIDOS ====================
let lastOrderCount = 0;

async function loadOrders() {
    const store = getCurrentStore();
    if (!store) return;
    
    try {
        const orders = await apiFetch(`/api/admin/pedidos?tienda=${store}`);
        lastOrderCount = orders.length;
        
        const container = $('ordersList');
        
        if (!orders.length) {
            container.innerHTML = '<div class="card"><div class="card-body empty-state">No hay pedidos</div></div>';
            return;
        }
        
        container.innerHTML = orders.map(p => {
            let estadoClass = 'warning';
            if (p.estado === 'confirmado') estadoClass = 'info';
            else if (p.estado === 'enviado') estadoClass = 'primary';
            else if (p.estado === 'entregado') estadoClass = 'success';
            
            return `
                <div class="card order-card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <strong>Pedido #${p.id}</strong>
                                <small class="text-muted ms-2">${new Date(p.created_at).toLocaleString()}</small>
                            </div>
                            <div>
                                ${p.codigo_cliente ? `<span class="codigo-badge me-2">Código: ${escapeHtml(p.codigo_cliente)}</span>` : ''}
                                <span class="badge bg-${estadoClass}">${p.estado}</span>
                            </div>
                        </div>
                        <hr>
                        <div class="row mb-2">
                            <div class="col-md-4"><i class="fas fa-user"></i> ${escapeHtml(p.nombre)}</div>
                            <div class="col-md-4"><i class="fas fa-phone"></i> ${escapeHtml(p.telefono)}</div>
                            <div class="col-md-4"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(p.direccion)}</div>
                        </div>
                        <div class="bg-light p-3 rounded">
                            ${(p.items || []).map(i => `
                                <div class="d-flex justify-content-between">
                                    <span>${i.qty}x ${escapeHtml(i.nombre)}</span>
                                    <span>$${((i.precio || 0) * i.qty).toFixed(2)}</span>
                                </div>
                            `).join('')}
                            <hr>
                            <div class="d-flex justify-content-between fw-bold">
                                <span>Total</span>
                                <span>$${Number(p.total).toFixed(2)} ${p.moneda || 'CUP'}</span>
                            </div>
                        </div>
                        <div class="mt-3 d-flex gap-2">
                            <select class="form-select form-select-sm w-auto" onchange="updateOrderStatus(${p.id}, this.value)">
                                <option value="pendiente" ${p.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option>
                                <option value="confirmado" ${p.estado === 'confirmado' ? 'selected' : ''}>Confirmado</option>
                                <option value="enviado" ${p.estado === 'enviado' ? 'selected' : ''}>Enviado</option>
                                <option value="entregado" ${p.estado === 'entregado' ? 'selected' : ''}>Entregado</option>
                            </select>
                            <button class="btn btn-whatsapp btn-sm" onclick="notifyWhatsApp('${p.telefono}', '${p.nombre}', ${p.id})">
                                <i class="fab fa-whatsapp"></i> Notificar
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteOrder(${p.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    } catch (error) {
        console.error('Error loading orders:', error);
    }
}

window.notifyWhatsApp = function(phone, name, orderId) {
    const msg = `Hola ${name}, gracias por tu pedido #${orderId}. En breve recibirás tu domicilio. ¡Gracias!`;
    const cleanPhone = phone.replace(/\D/g, '');
    window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
};

window.updateOrderStatus = async function(id, status) {
    try {
        await apiFetch(`/api/admin/pedidos/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ tienda: getCurrentStore(), estado: status })
        });
        await loadOrders();
        showToast(`✅ Pedido #${id} → ${status}`);
    } catch (error) {
        showToast('Error al actualizar', true);
    }
};

window.deleteOrder = async function(id) {
    if (!confirm('¿Eliminar este pedido?')) return;
    
    try {
        await apiFetch(`/api/admin/pedidos/${id}?tienda=${getCurrentStore()}`, { method: 'DELETE' });
        await loadOrders();
        showToast('🗑️ Pedido eliminado');
    } catch (error) {
        showToast('Error al eliminar', true);
    }
};

window.deleteAllOrders = async function() {
    if (!confirm('¿Eliminar TODOS los pedidos de esta tienda?')) return;
    
    try {
        await apiFetch(`/api/admin/pedidos?tienda=${getCurrentStore()}`, { method: 'DELETE' });
        await loadOrders();
        showToast('🗑️ Todos los pedidos eliminados');
    } catch (error) {
        showToast('Error al eliminar', true);
    }
};

function startPolling() {
    if (pollingInterval) clearInterval(pollingInterval);
    
    pollingInterval = setInterval(async () => {
        try {
            const store = getCurrentStore();
            if (!store) return;
            
            const orders = await apiFetch(`/api/admin/pedidos?tienda=${store}`);
            if (orders.length > lastOrderCount && lastOrderCount > 0) {
                const dot = $('newOrderDot');
                if (dot) dot.style.display = 'inline-block';
                showToast(`🔔 ${orders.length - lastOrderCount} nuevo(s) pedido(s)!`);
            }
            lastOrderCount = orders.length;
        } catch (error) {
            console.log('Polling error:', error);
        }
    }, 10000);
}

// ==================== CONFIGURACIÓN ====================
async function loadCurrencyConfig() {
    try {
        const config = await apiFetch('/api/admin/config');
        if (config && config.tasas) {
            $('rateUSD').value = (1 / config.tasas.USD).toFixed(2);
            $('rateEUR').value = (1 / config.tasas.EUR).toFixed(2);
        }
    } catch (error) {
        console.error('Error loading config:', error);
    }
}

window.saveCurrencyConfig = async function() {
    const usd = parseFloat($('rateUSD').value);
    const eur = parseFloat($('rateEUR').value);
    
    if (!usd || !eur || usd <= 0 || eur <= 0) {
        showToast('Valores inválidos', true);
        return;
    }
    
    try {
        await apiFetch('/api/admin/config', {
            method: 'PUT',
            body: JSON.stringify({
                monedaBase: 'CUP',
                tasas: { CUP: 1, USD: 1 / usd, EUR: 1 / eur }
            })
        });
        showToast('✅ Configuración guardada');
    } catch (error) {
        showToast('Error al guardar', true);
    }
};

// ==================== NAVEGACIÓN ====================
window.switchSection = function(section) {
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    document.querySelector(`[data-section="${section}"]`).classList.add('active');
    
    document.querySelectorAll('[id^="view-"]').forEach(view => view.style.display = 'none');
    $(`view-${section}`).style.display = 'block';
    
    if (section === 'products') loadProducts();
    if (section === 'orders') {
        loadOrders();
        const dot = $('newOrderDot');
        if (dot) dot.style.display = 'none';
    }
    if (section === 'stores') loadStoresTable();
    if (section === 'settings') loadCurrencyConfig();
    
    if (window.innerWidth < 768) {
        $('sidebar').classList.remove('active');
    }
};

// ==================== UTILIDADES HTML ====================
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

document.getElementById('passInput').onkeypress = function(e) {
    if (e.key === 'Enter') doLogin();
